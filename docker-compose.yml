version: '3'

services:
  backend:
    build:
      context: .
      dockerfile: dockerfile.backend
      container_name: backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: dockerfile.frontend
      container_name: frontend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend