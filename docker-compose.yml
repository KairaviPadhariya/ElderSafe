version: '3.8'

services:

  backend:
    container_name: eldersafe-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    container_name: eldersafe-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://100.50.8.161:8000
    ports:
      - "5173:5173"
    restart: always
